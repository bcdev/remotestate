<html>
  <body>
    <div id="root"></div>
    <script type="module">
      import React, { useState, useEffect } from "https://esm.sh/react@19";
      import { createRoot } from "https://esm.sh/react-dom@19/client";

      // zwieback client inline — no bundle required.
      // here we use a raw WebSocket without the
      // zwieback JavaScript library.

      const ws = new WebSocket("ws://localhost:9753/ws");

      ws.onopen = () => {
        // get initial count
        ws.send(JSON.stringify({
          type: "get",
          id: "1",
          path: "count",
        }));
      };

      function App() {
        const [count, setCount] = useState(null);

        useEffect(() => {
          ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.path === "count" || (msg.updates && "count" in msg.updates)) {
              setCount(msg.value ?? msg.updates.count);
            }
          };
        }, []);

        function handleIncrementClick() {
          console.log("handleIncrementClick! ws:", ws)
          ws.send(JSON.stringify({
            type: "action",
            id: crypto.randomUUID(),
            tid: "increment-x",
            method: "increment",
            args: [],
            kwargs: {},
          }));
        }

        return React.createElement("div", null,
          React.createElement("p", null, `Count: ${count ?? "..."}`),
          React.createElement("button", {
            onClick: handleIncrementClick
          }, "Increment")
        );
      }

      const rootElem = document.getElementById("root");
      createRoot(rootElem).render(React.createElement(App));
    </script>
  </body>
</html>
