name: CI

on:
  push:
  pull_request:

jobs:
  python-library:
    name: Python library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remotestate-py
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.71.0
          manifest-path: remotestate-py/pyproject.toml
          locked: true

      - name: Lint
        run: pixi run lint

      - name: Typecheck
        run: pixi run mypy

      - name: Test
        run: pixi run tests

  typescript-library:
    name: TypeScript library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remotestate-ts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: remotestate-ts/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck and Lint
        run: npm run checks

      - name: Test
        run: npm run tests

      - name: Build
        run: npm run build

  demo:
    name: Demo app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remotestate-demo
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            remotestate-ts/package-lock.json
            remotestate-demo/package-lock.json

      - name: Install library dependencies
        working-directory: remotestate-ts
        run: npm ci

      - name: Build library
        working-directory: remotestate-ts
        run: npm run build

      - name: Install
        run: npm ci

      - name: Typecheck and Lint
        run: npm run checks

      - name: Typecheck and build
        run: npm run build
